# model name
exp_name: 'BEVCarFinetune_2_0.7'

# Training parameters
max_iters: 70000
log_freq: 100
shuffle: true
dset: 'trainval'
save_freq: 1000
batch_size: 1
grad_acc: 5
lr: 0.0003
use_scheduler: true
weight_decay: 0.0000001
nworkers: 4

# Directories
data_dir: '/beegfs/scratch/workspace/es_nialit00-nuscenes_ws/nuscenes'
custom_dataroot: 'datasets/scaled_images'
log_dir: 'logs_nuscenes'
ckpt_dir: 'model_checkpoints'
keep_latest: 75

#----------------------------------------------
#First Finetune (JEPA → BEVCar)
#----------------------------------------------

#init_dir: 'model_checkpoints/Mask_0.70_jepa_ssl_4_1e-4_02-24-19'
#ignore_load: []        # load everything that matches
#load_step: false       # BEVCar starts at 0
#load_optimizer: false  # not JEPA optimizer states
#load_scheduler: false  # BEVCar LR schedule


#----------------------------------------------
# Resume Finetuning (continue BEVCar)
#----------------------------------------------
init_dir: 'model_checkpoints/BEVCarFinetune_1_0.7_1x5_3e-4s_12-22-58'
ignore_load: null
load_step: true
load_optimizer: true
load_scheduler: true 


# Data parameters
final_dim: [448, 896]  # to match //8, //14, //16 and //32 in Vit
rand_flip: true
rand_crop_and_resize: true
ncams: 6
nsweeps: 5

# Model parameters
encoder_type: 'dino_v2'
radar_encoder_type: 'voxel_net'
use_rpn_radar: false
train_task: 'both'
use_radar: true
use_radar_filters: false
use_radar_encoder: true
use_metaradar: false
use_shallow_metadata: true
use_pre_scaled_imgs: false
use_obj_layer_only_on_map: true
init_query_with_image_feats: true
do_rgbcompress: true
do_shuffle_cams: true
use_multi_scale_img_feats: true
num_layers: 6

freeze_dino: true
do_feat_enc_dec: true
combine_feat_init_w_learned_q: true
model_type: 'transformer'
use_radar_occupancy_map: false
learnable_fuse_query: true

# wandb
group: 'BEVCarFinetune'
notes: 'BEVCarFinetune model: radar encoding, DINO as image backbone, fusion and lifting based on transformer,
6 blocks, radar init, image init, multiscale feats, enc-dec, radar as query for fusion,
with learnable queries'
name: 'BEVCarFinetune'
